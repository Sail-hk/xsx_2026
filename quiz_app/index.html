<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>习思想刷题程序</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <p class="sidebar__kicker">Dashboard</p>
          <h1>习思想刷题程序</h1>
          <p class="sidebar__summary">按题型和按章节切换练习，做题、判题、统计都集中在同一工作台里。</p>
        </div>

        <section class="nav-block">
          <div class="nav-block__head">
            <h2>按题型</h2>
            <span>单选 / 多选 / 判断</span>
          </div>
          <div id="typeModuleList" class="module-list"></div>
        </section>

        <section class="nav-block nav-block--chapters">
          <div class="nav-block__head">
            <h2>按章节</h2>
            <span>导论到综合练习</span>
          </div>
          <div id="chapterModuleList" class="module-list module-list--chapters"></div>
        </section>

        <section class="sidebar__tipcard">
          <p class="sidebar__tiptitle">刷题建议</p>
          <p>先按章节集中复习，再切回题型模块强化训练，最后用综合练习查漏补缺。</p>
        </section>
      </aside>

      <main class="dashboard">
        <section class="overview panel">
          <div class="overview__copy">
            <p class="section-label">当前工作台</p>
            <h2>一个更集中、更稳定的刷题界面</h2>
            <p>
              左侧负责选择模块，右侧负责查看状态和答题。默认首页会给出快速入口，开始练习后切换为完整题目视图。
            </p>
            <div class="overview__actions">
              <button id="startTypeOverviewBtn" class="primary-btn" type="button">从题型开始</button>
              <button id="startChapterOverviewBtn" class="ghost-btn" type="button">从章节开始</button>
            </div>
          </div>
          <div class="overview__stats" id="metaCard"></div>
        </section>

        <section class="workspace panel">
          <div id="emptyState" class="empty-state"></div>

          <div id="quizApp" class="quiz hidden">
            <div class="toolbar">
              <div class="toolbar__title">
                <p class="section-label">当前练习</p>
                <h2 id="moduleTitle"></h2>
                <p id="progressText" class="muted"></p>
              </div>
              <div class="toolbar__actions">
                <button id="toggleOrderBtn" class="ghost-btn" type="button"></button>
                <button id="restartBtn" class="ghost-btn" type="button">重新开始</button>
              </div>
            </div>

            <div class="scoreboard" id="scoreboard"></div>

            <article class="question-card">
              <div class="question-card__header">
                <span id="questionTag" class="tag"></span>
                <span id="sourceTag" class="source-tag"></span>
              </div>
              <h3 id="questionStem" class="question-stem"></h3>
              <div id="options" class="options"></div>
              <div id="multiActions" class="multi-actions hidden">
                <button id="submitMultiBtn" class="primary-btn" type="button">提交答案</button>
                <button id="clearMultiBtn" class="ghost-btn" type="button">清空选择</button>
              </div>
              <div id="feedback" class="feedback hidden"></div>
              <div class="question-actions">
                <button id="showAnswerBtn" class="ghost-btn" type="button">查看答案</button>
                <button id="nextBtn" class="primary-btn" type="button">下一题</button>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script src="./questions-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
